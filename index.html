<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reclame Itz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; margin: 0; font-family: 'Inter', sans-serif; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #f0f0f0; color: #888; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { background: white; color: #0B3D91; border-bottom: 3px solid #FFB703; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 15px; border-left: 8px solid #ddd; position: relative; }
        input, select { padding:14px; border-radius:12px; border:1px solid #ddd; width:100%; box-sizing:border-box; margin-bottom:10px; }
        .btn-principal { background:#0B3D91; color:white; border:none; padding:16px; border-radius:12px; font-weight:700; width:100%; cursor:pointer; }
        .btn-voto { flex:1; padding:10px; border-radius:10px; font-weight:700; cursor:pointer; border:1px solid; }
    </style>
</head>
<body>

    <section id="loginScreen" style="display: flex; width: 100%; height: 100vh; justify-content: center; align-items: center; position: fixed; top:0; left:0; z-index:999; background: #f4f7f6;">
        <div style="width: 90%; max-width: 380px; text-align: center; background: white; padding: 40px 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
            <h1 style="color:#0B3D91; font-weight:800;">Reclame <span style="color:#FFB703;">Itz</span></h1>
            <button onclick="loginGoogle()" style="display:flex; align-items:center; justify-content:center; gap:10px; padding:14px; border:1px solid #ddd; border-radius:12px; background:white; font-weight:600; width:100%; margin:20px 0; cursor:pointer;">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18"> Google
            </button>
            <input type="email" id="emailInput" placeholder="E-mail">
            <input type="password" id="senhaInput" placeholder="Senha">
            <button onclick="loginEmail()" class="btn-principal">ENTRAR</button>
            <p style="margin-top:20px; font-size:0.9rem;">Novo? <span style="color:#00A859; font-weight:700; cursor:pointer;" onclick="toggleTelas('cadastro')">Criar conta</span></p>
        </div>
    </section>

    <section id="registerScreen" style="display:none; width:100%; height:100vh; justify-content:center; align-items:center; position:fixed; top:0; left:0; z-index:999; background:#f4f7f6;">
        <div style="width:90%; max-width:380px; text-align:center; background:white; padding:40px 30px; border-radius:24px;">
            <h2 style="color:#00A859;">Cadastro</h2>
            <input type="email" id="regEmail" placeholder="E-mail">
            <input type="password" id="regSenha" placeholder="Senha (6+)">
            <button onclick="cadastrarUsuario()" style="background:#00A859;" class="btn-principal">CADASTRAR</button>
            <p style="margin-top:20px; cursor:pointer;" onclick="toggleTelas('login')">Voltar ao Login</p>
        </div>
    </section>

    <div id="appContainer" style="display:none;">
        <header style="background:#0B3D91; padding:15px; color:white; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;">
            <h2 style="margin:0;">Reclame <span style="color:#FFB703;">Itz</span></h2>
            <div style="display:flex; gap:15px; align-items:center;">
                <i id="btnAdminUsers" class='bx bx-group' style="display:none; font-size:24px; cursor:pointer;" onclick="abrirModalUsuarios()"></i>
                <div onclick="sair()" style="cursor:pointer; font-weight:600;"><i class='bx bx-log-out'></i></div>
            </div>
        </header>

        <div style="display:flex; background:white; position:sticky; top:58px; z-index:99; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
            <button id="tabAtivos" class="tab-btn active" onclick="mudarAba('ativos')">ATIVOS</button>
            <button id="tabConcluidos" class="tab-btn" onclick="mudarAba('concluidos')">CONCLUÍDOS</button>
        </div>

        <main style="padding:20px; padding-bottom:100px;"><div id="feed"></div></main>

        <button onclick="document.getElementById('modalPost').style.display='flex'" style="position:fixed; bottom:30px; right:20px; width:65px; height:65px; background:#00A859; color:white; border-radius:50%; border:none; font-size:35px; box-shadow:0 5px 15px rgba(0,168,89,0.3); z-index:1000;">+</button>

        <div id="modalUsuarios" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:3000; overflow-y:auto; padding:20px; box-sizing:border-box;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:#0B3D91;">Usuários</h2>
                <button onclick="document.getElementById('modalUsuarios').style.display='none'" style="border:none; background:none; font-size:30px;">&times;</button>
            </div>
            <div id="listaUsuarios">Carregando...</div>
        </div>

        <div id="modalPost" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:flex-end;">
            <div style="background:white; width:100%; border-radius:25px 25px 0 0; padding:25px; box-sizing:border-box;">
                <h3 style="margin-bottom:15px; color:#0B3D91;">Relatar Problema</h3>
                <input type="text" id="postTitulo" placeholder="Ex: Buraco na Rua XV">
                <select id="postCategoria">
                    <option>Infraestrutura</option>
                    <option>Saneamento</option>
                    <option>Saúde</option>
                    <option>Iluminação</option>
                </select>
                <button id="btnPublicar" onclick="publicarReclamacao()" class="btn-principal" style="background:#00A859;">PUBLICAR COM GPS</button>
                <button onclick="document.getElementById('modalPost').style.display='none'" style="width:100%; background:transparent; border:none; color:#999; margin-top:10px;">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithRedirect, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, increment, arrayUnion, getDoc, deleteDoc, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDOVY9fNz1ypYMa9DliAxIbZs6sQG2VKCk",
            authDomain: "reclame-itz.firebaseapp.com",
            projectId: "reclame-itz",
            storageBucket: "reclame-itz.firebasestorage.app",
            messagingSenderId: "146616793803",
            appId: "1:146616793803:web:8a2863859b172af293794e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let abaAtual = "ativos";
        let nivelAcesso = "cidadao";

        setPersistence(auth, browserLocalPersistence);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (docSnap.exists()) {
                    nivelAcesso = docSnap.data().role;
                    if(nivelAcesso === 'admin') document.getElementById('btnAdminUsers').style.display = 'block';
                } else {
                    await setDoc(doc(db, "usuarios", user.uid), { nome: user.displayName || user.email.split('@')[0], role: 'cidadao', uid: user.uid });
                }
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('registerScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                carregarFeed();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        });

        window.mudarAba = (aba) => {
            abaAtual = aba;
            document.getElementById('tabAtivos').classList.toggle('active', aba === 'ativos');
            document.getElementById('tabConcluidos').classList.toggle('active', aba === 'concluidos');
            carregarFeed();
        };

        function carregarFeed() {
            const q = query(collection(db, "reclamacoes"), orderBy("apoios", "desc"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach((d) => {
                    const p = d.data();
                    const resolvido = p.status === "concluido";
                    if (abaAtual === "ativos" && resolvido) return;
                    if (abaAtual === "concluidos" && !resolvido) return;

                    const config = { pendente: "#ff4d4d", execucao: "#ffb703", concluido: "#00a859" };
                    
                    let botoesFeedback = "";
                    if (resolvido) {
                        botoesFeedback = `
                        <div style="display:flex; gap:10px; margin-top:12px;">
                            <button onclick="votar('${d.id}', 'likes')" class="btn-voto" style="background:#f0fef4; color:#00a859; border-color:#00a859;">✅ Bom (${p.likes || 0})</button>
                            <button onclick="votar('${d.id}', 'dislikes')" class="btn-voto" style="background:#fef0f0; color:#ff4d4d; border-color:#ff4d4d;">❌ Ruim (${p.dislikes || 0})</button>
                        </div>`;
                    } else {
                        botoesFeedback = `<button onclick="apoiar('${d.id}')" style="width:100%; background:#0B3D91; color:white; border:none; padding:12px; border-radius:10px; margin-top:10px; font-weight:700;">👍 Apoiar (${p.apoios || 0})</button>`;
                    }

                    let painelGestao = "";
                    if (nivelAcesso === "admin" || nivelAcesso === "oficial") {
                        painelGestao = `
                        <div style="background:#f0f4f8; padding:10px; border-radius:12px; margin-top:15px; border:1px solid #0B3D91;">
                            <select onchange="mudarStatus('${d.id}', this.value)" style="padding:5px; font-size:11px; width:auto; margin:0;">
                                <option value="pendente" ${p.status==='pendente'?'selected':''}>🔴 Pendente</option>
                                <option value="execucao" ${p.status==='execucao'?'selected':''}>🟡 Execução</option>
                                <option value="concluido" ${p.status==='concluido'?'selected':''}>🟢 Concluído</option>
                            </select>
                            ${nivelAcesso === "admin" ? `<button onclick="excluirPost('${d.id}')" style="background:red; color:white; border:none; padding:6px; border-radius:5px; font-size:10px; margin-left:10px;">EXCLUIR</button>` : ''}
                        </div>`;
                    }

                    feed.innerHTML += `
                        <div class="card" style="border-left-color: ${config[p.status]}">
                            <h3 style="color:#0B3D91; margin:0;">${p.titulo}</h3>
                            <p style="font-size:12px; color:#999;">${p.categoria} | Por: ${p.autor}</p>
                            ${botoesFeedback}
                            ${painelGestao}
                        </div>`;
                });
            });
        }

        // --- GESTÃO DE USUÁRIOS ---
        window.abrirModalUsuarios = async () => {
            document.getElementById('modalUsuarios').style.display = 'block';
            const lista = document.getElementById('listaUsuarios');
            lista.innerHTML = "Carregando...";
            const snap = await getDocs(collection(db, "usuarios"));
            lista.innerHTML = "";
            snap.forEach(u => {
                const user = u.data();
                lista.innerHTML += `
                    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <p style="margin:0; font-weight:700;">${user.nome}</p>
                            <p style="margin:0; font-size:10px; color:#666;">Cargo: ${user.role.toUpperCase()}</p>
                        </div>
                        <select onchange="alterarCargoUsuario('${u.id}', this.value)" style="width:auto; margin:0; font-size:10px; padding:5px;">
                            <option value="cidadao" ${user.role==='cidadao'?'selected':''}>Cidadão</option>
                            <option value="oficial" ${user.role==='oficial'?'selected':''}>Oficial</option>
                            <option value="admin" ${user.role==='admin'?'selected':''}>Admin</option>
                        </select>
                    </div>`;
            });
        };

        window.alterarCargoUsuario = async (id, novoCargo) => {
            if(confirm(`Mudar usuário para ${novoCargo}?`)) {
                await updateDoc(doc(db, "usuarios", id), { role: novoCargo });
                alert("Cargo atualizado!");
            }
        };

        // --- FUNÇÕES GERAIS ---
        window.votar = (id, campo) => updateDoc(doc(db, "reclamacoes", id), { [campo]: increment(1) });
        window.mudarStatus = (id, st) => updateDoc(doc(db, "reclamacoes", id), { status: st });
        window.excluirPost = (id) => confirm("Apagar?") && deleteDoc(doc(db, "reclamacoes", id));
        window.apoiar = async (id) => {
            const user = auth.currentUser;
            const docRef = doc(db, "reclamacoes", id);
            const snap = await getDoc(docRef);
            if (snap.exists() && (snap.data().listaApoios || []).includes(user.uid)) return alert("Já apoiou!");
            await updateDoc(docRef, { apoios: increment(1), listaApoios: arrayUnion(user.uid) });
        };
        window.publicarReclamacao = () => {
            const titulo = document.getElementById('postTitulo').value;
            const user = auth.currentUser;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await addDoc(collection(db, "reclamacoes"), {
                    titulo, categoria: document.getElementById('postCategoria').value,
                    lat: pos.coords.latitude, lng: pos.coords.longitude,
                    status: "pendente", apoios: 0, listaApoios: [], likes: 0, dislikes: 0,
                    uid: user.uid, autor: user.displayName || user.email.split('@')[0], data: serverTimestamp()
                });
                document.getElementById('modalPost').style.display = 'none';
            });
        };

        window.loginEmail = () => {
            const e = document.getElementById('emailInput').value, s = document.getElementById('senhaInput').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro: " + err.message));
        };
        window.cadastrarUsuario = () => {
            const e = document.getElementById('regEmail').value, s = document.getElementById('regSenha').value;
            createUserWithEmailAndPassword(auth, e, s).then(() => location.reload()).catch(err => alert(err.message));
        };
        window.toggleTelas = (t) => {
            document.getElementById('loginScreen').style.display = t === 'cadastro' ? 'none' : 'flex';
            document.getElementById('registerScreen').style.display = t === 'cadastro' ? 'flex' : 'none';
        };
        window.loginGoogle = () => signInWithRedirect(auth, provider);
        window.sair = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
