<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reclame Itz</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <section id="loginScreen" class="full-screen" style="display: flex; width: 100%; height: 100vh; justify-content: center; align-items: center; background: #f4f7f6; position: fixed; top:0; left:0; z-index:999;">
        <div class="login-container" style="width: 90%; max-width: 380px; text-align: center; background: white; padding: 40px 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
            <div class="logo-large">
                <div class="logo-dot" style="background:#FFB703; width:15px; height:15px; border-radius:50%; margin: 0 auto 10px;"></div>
                <h1 style="color:#0B3D91; font-weight:800; font-size: 2.2rem;">Reclame <span style="color:#FFB703;">Itz</span></h1>
                <p style="color:#666; margin-bottom: 30px;">Melhorando Imperatriz juntos</p>
            </div>
            
            <div class="login-methods" style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn-google" onclick="irParaApp()" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border: 1px solid #ddd; border-radius: 12px; background: white; font-weight: 600; cursor: pointer; width: 100%;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18">
                    Entrar com Google
                </button>

                <div class="divider" style="margin: 10px 0; color: #ccc; font-size: 0.8rem; text-align: center;"><span>ou e-mail</span></div>

                <input type="email" placeholder="Seu e-mail" style="padding: 14px; border-radius: 12px; border: 1px solid #ddd; outline: none; width: 100%; box-sizing: border-box;">
                <input type="password" placeholder="Sua senha" style="padding: 14px; border-radius: 12px; border: 1px solid #ddd; outline: none; width: 100%; box-sizing: border-box;">
                
                <button class="btn-primary" onclick="irParaApp()" style="background: #0B3D91; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(11,61,145,0.3); width: 100%;">
                    ENTRAR NO APP
                </button>

                <p style="margin-top: 25px; font-size: 0.9rem; color: #666; text-align: center;">
                    Ainda não tem conta? <span style="color: #00A859; font-weight: 700; cursor: pointer;" onclick="alert('Sistema de cadastro em breve!')">Cadastre-se aqui</span>
                </p>
            </div>
        </div>
    </section>

    <div id="appContainer" style="display: none; padding-bottom: 100px;">
        <header style="background: #0B3D91; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center;">
            <h2>Reclame <span style="color:#FFB703;">Itz</span></h2>
            <div onclick="location.reload()" style="cursor:pointer; font-weight: 600;">Sair</div>
        </header>

        <main style="padding: 20px;">
            <h2 style="color:#0B3D91;">Feed da Cidade</h2>
            <span style="color:#00A859; font-weight:700;">Imperatriz - MA</span>
            <div id="feed" style="margin-top: 20px;">
                <p style="text-align:center; color:#bbb; padding: 50px;">Nenhum relato ainda.<br>Toque no + para postar.</p>
            </div>
        </main>

        <button onclick="document.getElementById('modalPost').style.display='flex'" style="position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: #00A859; color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 5px 15px rgba(0,168,89,0.4); z-index: 1000; cursor: pointer;">+</button>

        <div id="modalPost" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:flex-end;">
            <div style="background:white; width:100%; border-radius:20px 20px 0 0; padding:25px; box-sizing: border-box;">
                <h3 style="margin-bottom:15px; color:#0B3D91;">Novo Relato</h3>
                
                <input type="text" placeholder="Título do problema" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
                
                <select style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                    <option>Saneamento</option>
                    <option>Saúde</option>
                    <option>Infraestrutura</option>
                    <option>Iluminação</option>
                </select>

                <div onclick="document.getElementById('foto').click()" style="border: 2px dashed #00A859; padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 15px; color: #00A859; cursor: pointer;">
                    <i class='bx bx-camera' style="font-size: 2rem;"></i><br>
                    <span id="labelFoto">Tirar ou anexar foto</span>
                    <input type="file" id="foto" hidden accept="image/*" onchange="document.getElementById('labelFoto').innerText='✅ Foto selecionada!'">
                </div>

                <button onclick="alert('Publicado com sucesso!')" style="width:100%; background:#00A859; color:white; padding:15px; border-radius:12px; border:none; font-weight:700; cursor: pointer;">PUBLICAR</button>
                <button onclick="document.getElementById('modalPost').style.display='none'" style="width:100%; background:none; border:none; color:#888; margin-top:15px; cursor: pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // Função para entrar blindada
        function irParaApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
        }
    </script>
</body>
</html>
